<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hypertension Intelligence - LifeLensAI</title>
  <link rel="stylesheet" href="css/index.css">
  <style>
    .split-layout { display: grid; grid-template-columns: 380px 1fr; gap: 3rem; margin-top: 3rem; align-items: start; }
    .input-sidebar { padding: 2.5rem; position: sticky; top: 120px; }
    .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    @media (max-width: 1024px) { .split-layout { grid-template-columns: 1fr; } .input-sidebar { position: static; } }
  </style>
</head>
<body>
  <header class="main-header"></header>
  <main class="container">
    <div class="split-layout">
      <aside class="glass-card input-sidebar animate-slide-up">
        <h3>Module Inputs</h3>
        <p class="text-muted mb-8" style="font-size: 0.9rem;">Analyze arterial pressure thresholds with AI precision.</p>
        <div class="glass-card" id="drop-zone" style="background: rgba(220, 20, 60, 0.03); border: 2px dashed var(--primary-pink); padding: 1.5rem; text-align: center; cursor: pointer; margin-bottom: 2rem;">
          <span>📄</span>
          <p style="font-weight: 600; font-size: 0.9rem; margin-top: 0.5rem;">Extract from Report</p>
          <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
        </div>
        <form id="health-form">
          <div class="input-group"><label class="input-label">Age</label><input type="number" id="age" required class="input-field" placeholder="Years"></div>
          <div class="input-group"><label class="input-label">BMI</label><input type="number" step="0.1" id="bmi" required class="input-field" placeholder="kg/m²"></div>
          <div class="input-group"><label class="input-label">Systolic BP (ap_hi)</label><input type="number" id="ap_hi" required class="input-field" placeholder="mmHg"></div>
          <div class="input-group"><label class="input-label">Diastolic BP (ap_lo)</label><input type="number" id="ap_lo" required class="input-field" placeholder="mmHg"></div>
          <div class="input-group"><label class="input-label">Cholesterol Factor (1-3)</label><input type="number" id="cholesterol" required class="input-field" min="1" max="3"></div>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">Run Intelligence Engine</button>
        </form>
      </aside>
      <div class="results-area">
        <div id="empty-state" class="glass-card flex flex-col items-center justify-center text-center animate-slide-up" style="height: 400px; padding: 3rem;">
          <div style="font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.5;">💓</div>
          <h2>Ready for Arterial Analysis</h2>
          <p class="text-muted mt-2">Fill out the parameters or extract data from a clinical report to proceed.</p>
        </div>
        <div id="full-dashboard" class="hidden">
          <div id="risk-alerts"></div>
          <div id="predictions-grid" class="flex gap-6 mb-8"></div>
          <div class="glass-card mb-8">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-subtle);"><h3 style="font-size: 1.1rem;">Arterial Health Interpretation</h3></div>
            <div id="metrics-analysis"></div>
          </div>
          <h3 class="mb-6 mt-12 flex items-center gap-3"><span style="padding: 10px; background: var(--secondary-pink); border-radius: 12px; color: var(--primary-crimson);">🛡️</span> AI Intelligence Report</h3>
          <div class="rec-grid" id="recommendations-grid"></div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/report.js"></script>
  <script>
    document.getElementById('health-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        age: parseInt(document.getElementById('age').value),
        bmi: parseFloat(document.getElementById('bmi').value),
        ap_hi: parseFloat(document.getElementById('ap_hi').value),
        ap_lo: parseFloat(document.getElementById('ap_lo').value),
        cholesterol: parseFloat(document.getElementById('cholesterol').value)
      };
      const res = await predictDisease('hypertension', payload);
      if(res && res.status === 'success') renderDoctorReport(res.report);
    });
    const fileInput = document.getElementById('pdf-upload');
    const dropZone = document.getElementById('drop-zone');
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
      const data = await extractPDFData(e.target.files[0]);
      if(data && data.status === 'success') {
        const d = data.data;
        if(d.age) document.getElementById('age').value = d.age;
        if(d.bmi) document.getElementById('bmi').value = d.bmi;
        if(d.ap_hi) document.getElementById('ap_hi').value = d.ap_hi;
        if(d.ap_lo) document.getElementById('ap_lo').value = d.ap_lo;
      }
    }
  </script>
</body>
</html>
