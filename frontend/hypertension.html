<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hypertension Intelligence - LifeLensAI</title>
  <link rel="stylesheet" href="css/index.css">
  <style>
    .split-layout { display: grid; grid-template-columns: 380px 1fr; gap: 3rem; margin-top: 3rem; align-items: start; }
    .input-sidebar { padding: 2.5rem; position: sticky; top: 120px; }
    .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    @media (max-width: 1024px) { .split-layout { grid-template-columns: 1fr; } .input-sidebar { position: static; } }
  </style>
</head>
<body>
  <header class="main-header"></header>
  <main class="container">
    <div class="split-layout">
      <aside class="glass-card input-sidebar animate-slide-up" style="padding: 0;">
        <div class="card-visual" style="height: 180px; border-radius: 20px 20px 0 0;">
          <img src="assets/branding/hypertension.png" alt="Hypertension">
        </div>
        <div style="padding: 2.5rem;">
          <h3>Module Inputs</h3>
          <p class="text-muted mb-8" style="font-size: 0.9rem;">Analyze arterial pressure thresholds with AI precision.</p>
        <div class="glass-card" id="drop-zone" style="background: rgba(220, 20, 60, 0.03); border: 2px dashed var(--primary-pink); padding: 1.5rem; text-align: center; cursor: pointer; margin-bottom: 2rem;">
          <span>📄</span>
          <p style="font-weight: 600; font-size: 0.9rem; margin-top: 0.5rem;">Extract from Report</p>
          <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
        </div>
        <form id="health-form">
          <div class="input-group"><label class="input-label">Age</label><input type="number" id="Age" required class="input-field" placeholder="e.g. 45"></div>
          <div class="input-group">
            <label class="input-label">Gender</label>
            <select id="Gender" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
          <div class="input-group"><label class="input-label">Systolic BP (SBP)</label><input type="number" id="SBP" required class="input-field" placeholder="e.g. 130 mmHg"></div>
          <div class="input-group"><label class="input-label">Diastolic BP (DBP)</label><input type="number" id="DBP" required class="input-field" placeholder="e.g. 85 mmHg"></div>
          <div class="input-group"><label class="input-label">BMI</label><input type="number" step="0.1" id="BMI" required class="input-field" placeholder="e.g. 26.4 kg/m²"></div>
          
          <div class="input-group">
            <label class="input-label">Physical Activity</label>
            <select id="Physical_Activity" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Activity Level</option>
              <option value="Low">Low</option>
              <option value="Moderate">Moderate</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Diet (Packaged Food)</label>
            <select id="Diet_PackagedFood" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Dietary Fast Food</option>
              <option value="Often">Often</option>
              <option value="Sometimes">Sometimes</option>
              <option value="Rarely">Rarely</option>
              <option value="Never">Never</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Smoking</label>
            <select id="Smoking" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Yes/No</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Alcohol</label>
            <select id="Alcohol" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Yes/No</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Stress Level</label>
            <select id="Stress_Level" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Stress Level</option>
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="input-group"><label class="input-label">Sleep Duration</label><input type="number" step="0.5" id="Sleep_Duration_hrs" required class="input-field" placeholder="e.g. 7.5 hrs"></div>
          <div class="input-group">
            <label class="input-label">Family History (Hypertension)</label>
            <select id="Family_History_Hypertension" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Yes/No</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Diabetes Status</label>
            <select id="Diabetes_Status" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Yes/No</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          
          <div class="input-group"><label class="input-label">LDL Cholesterol</label><input type="number" step="0.1" id="LDL_Cholesterol" required class="input-field" placeholder="e.g. 130 mg/dL"></div>
          <div class="input-group"><label class="input-label">HDL Cholesterol</label><input type="number" step="0.1" id="HDL_Cholesterol" required class="input-field" placeholder="e.g. 45 mg/dL"></div>
          <div class="input-group"><label class="input-label">Triglycerides</label><input type="number" step="0.1" id="Triglycerides" required class="input-field" placeholder="e.g. 160 mg/dL"></div>
          
          <button type="submit" class="btn btn-primary mt-6" style="width: 100%; justify-content: center; padding: 1rem;">Run Intelligence Engine</button>
        </form>
      </aside>
      <div class="results-area">
        <div id="empty-state" class="glass-card flex flex-col items-center justify-center text-center animate-slide-up" style="height: 400px; padding: 3rem;">
          <div style="font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.5;">💓</div>
          <h2>Ready for Arterial Analysis</h2>
          <p class="text-muted mt-2">Fill out the parameters or extract data from a clinical report to proceed.</p>
        </div>
        <div id="full-dashboard" class="hidden">
          <div id="risk-alerts"></div>
          <div id="predictions-grid" class="flex gap-6 mb-8"></div>
          <div class="glass-card mb-8">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-subtle);"><h3 style="font-size: 1.1rem;">Arterial Health Interpretation</h3></div>
            <div id="metrics-analysis"></div>
          </div>
          <h3 class="mb-6 mt-12 flex items-center gap-3"><span style="padding: 10px; background: var(--secondary-pink); border-radius: 12px; color: var(--primary-crimson);">🛡️</span> AI Intelligence Report</h3>
          <div class="rec-grid" id="recommendations-grid"></div>
        </div>
      </div>
    </div>
  </main>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/report.js"></script>
  <script>
    document.getElementById('health-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        Age: parseInt(document.getElementById('Age').value),
        Gender: document.getElementById('Gender').value,
        SBP: parseInt(document.getElementById('SBP').value),
        DBP: parseInt(document.getElementById('DBP').value),
        BMI: parseFloat(document.getElementById('BMI').value),
        Physical_Activity: document.getElementById('Physical_Activity').value,
        Diet_PackagedFood: document.getElementById('Diet_PackagedFood').value,
        Smoking: document.getElementById('Smoking').value,
        Alcohol: document.getElementById('Alcohol').value,
        Stress_Level: document.getElementById('Stress_Level').value,
        Sleep_Duration_hrs: parseFloat(document.getElementById('Sleep_Duration_hrs').value),
        Family_History_Hypertension: document.getElementById('Family_History_Hypertension').value,
        Diabetes_Status: document.getElementById('Diabetes_Status').value,
        LDL_Cholesterol: parseFloat(document.getElementById('LDL_Cholesterol').value),
        HDL_Cholesterol: parseFloat(document.getElementById('HDL_Cholesterol').value),
        Triglycerides: parseFloat(document.getElementById('Triglycerides').value)
      };
      const res = await predictDisease('hypertension', payload);
      if(res && res.status === 'success') renderDoctorReport(res.report);
    });
    const fileInput = document.getElementById('pdf-upload');
    const dropZone = document.getElementById('drop-zone');
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
      const data = await extractPDFData(e.target.files[0]);
      if(data && data.status === 'success') {
        const d = data.data;
        if(d.age) document.getElementById('age').value = d.age;
        if(d.bmi) document.getElementById('bmi').value = d.bmi;
        if(d.ap_hi) document.getElementById('ap_hi').value = d.ap_hi;
        if(d.ap_lo) document.getElementById('ap_lo').value = d.ap_lo;
      }
    }
  </script>
</body>
</html>
