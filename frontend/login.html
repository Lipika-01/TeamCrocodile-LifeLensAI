<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - LifeLensAI</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <header class="main-header"></header>

  <main class="container">
    <div style="max-width: 480px; margin: 8vh auto; padding: 3rem;" class="glass-card card-border-none animate-slide-up">
      <h2 style="font-size: 2rem; margin-bottom: 0.5rem;" class="text-center">Welcome Back</h2>
      <p class="text-muted text-center mb-8">Access your clinical intelligence dashboard.</p>
      
      <form id="login-form">
        <div class="input-group">
          <label class="input-label">Username</label>
          <input type="text" id="username" class="input-field input-border-none" required placeholder="your_username">
        </div>
        <div class="input-group">
          <label class="input-label">Password</label>
          <input type="password" id="password" class="input-field input-border-none" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">
          Sign In
        </button>
      </form>
      
      <p class="text-center mt-8" style="font-size: 0.9rem; color: var(--text-muted);">
        New to LifeLensAI? <a href="register.html" style="color: var(--primary-crimson); font-weight: 600; text-decoration: none;">Create an account</a>
      </p>
    </div>
  </main>

  <script src="js/components.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
