<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breast Cancer Intelligence - LifeLensAI</title>
  <link rel="stylesheet" href="css/index.css">
  <style>
    .split-layout { display: grid; grid-template-columns: 380px 1fr; gap: 3rem; margin-top: 3rem; align-items: start; }
    .input-sidebar { padding: 2.5rem; position: sticky; top: 120px; max-height: calc(100vh - 140px); overflow-y: auto; }
    .results-area { min-height: 800px; }
    .metric-bubble { padding: 1.5rem; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; }
    .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    
    /* Scrollbar for sidebar */
    .input-sidebar::-webkit-scrollbar { width: 6px; }
    .input-sidebar::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 10px; }
    
    @media (max-width: 1024px) {
      .split-layout { grid-template-columns: 1fr; }
      .input-sidebar { position: static; max-height: none; }
    }
  </style>
</head>
<body>

  <header class="main-header"></header>

  <main class="container">
    <div class="split-layout">
      
      <!-- Left: Inputs -->
      <aside class="glass-card input-sidebar animate-slide-up">
        <h3 class="mb-2">Module Inputs</h3>
        <p class="text-muted mb-8" style="font-size: 0.9rem;">Provide histopathological metrics for AI classification.</p>
        
        <form id="health-form">
          <div class="input-group">
            <label class="input-label">Radius (Mean)</label>
            <input type="number" step="0.001" id="radius_mean" required class="input-field" placeholder="e.g. 17.99">
          </div>
          <div class="input-group">
            <label class="input-label">Texture (Mean)</label>
            <input type="number" step="0.001" id="texture_mean" required class="input-field" placeholder="e.g. 10.38">
          </div>
          <div class="input-group">
            <label class="input-label">Perimeter (Mean)</label>
            <input type="number" step="0.001" id="perimeter_mean" required class="input-field" placeholder="e.g. 122.8">
          </div>
          <div class="input-group">
            <label class="input-label">Area (Mean)</label>
            <input type="number" step="0.001" id="area_mean" required class="input-field" placeholder="e.g. 1001.0">
          </div>
          <div class="input-group">
            <label class="input-label">Smoothness (Mean)</label>
            <input type="number" step="0.0001" id="smoothness_mean" required class="input-field" placeholder="e.g. 0.1184">
          </div>
          <div class="input-group">
            <label class="input-label">Compactness (Mean)</label>
            <input type="number" step="0.0001" id="compactness_mean" required class="input-field" placeholder="e.g. 0.2776">
          </div>
          <div class="input-group">
            <label class="input-label">Concavity (Mean)</label>
            <input type="number" step="0.0001" id="concavity_mean" required class="input-field" placeholder="e.g. 0.3001">
          </div>
          <div class="input-group">
            <label class="input-label">Symmetry (Mean)</label>
            <input type="number" step="0.0001" id="symmetry_mean" required class="input-field" placeholder="e.g. 0.2419">
          </div>
          <div class="input-group">
            <label class="input-label">Fractal Dimension (Mean)</label>
            <input type="number" step="0.0001" id="fractal_dimension_mean" required class="input-field" placeholder="e.g. 0.0787">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
            Run Intelligence Engine
          </button>
        </form>
      </aside>

      <!-- Right: Results -->
      <div class="results-area">
        <div id="empty-state" class="glass-card flex flex-col items-center justify-center text-center animate-slide-up" style="height: 400px; padding: 3rem;">
          <div style="font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.5;">🎀</div>
          <h2>Ready for Intelligence Analysis</h2>
          <p class="text-muted mt-2" style="max-width: 400px;">Please populate the histopathology indicators on the left to generate your flagship medical report.</p>
        </div>

        <div id="full-dashboard" class="hidden">
          <div id="risk-alerts"></div>
          
          <div id="predictions-grid" class="flex gap-6 mb-8"></div>

          <div class="glass-card mb-8">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-subtle);">
              <h3 style="font-size: 1.1rem;">Pathology Metrics Interpretation</h3>
            </div>
            <div id="metrics-analysis"></div>
          </div>

          <h3 class="mb-6 mt-12 flex items-center gap-3">
             <span style="padding: 10px; background: var(--secondary-pink); border-radius: 12px; color: var(--primary-crimson);">🛡️</span>
             AI Intelligence Report
          </h3>
          <div class="rec-grid" id="recommendations-grid"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/report.js"></script>
  <script>
    document.getElementById('health-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        radius_mean: parseFloat(document.getElementById('radius_mean').value),
        texture_mean: parseFloat(document.getElementById('texture_mean').value),
        perimeter_mean: parseFloat(document.getElementById('perimeter_mean').value),
        area_mean: parseFloat(document.getElementById('area_mean').value),
        smoothness_mean: parseFloat(document.getElementById('smoothness_mean').value),
        compactness_mean: parseFloat(document.getElementById('compactness_mean').value),
        concavity_mean: parseFloat(document.getElementById('concavity_mean').value),
        symmetry_mean: parseFloat(document.getElementById('symmetry_mean').value),
        fractal_dimension_mean: parseFloat(document.getElementById('fractal_dimension_mean').value)
      };
      
      const res = await predictDisease('breast-cancer', payload);
      if(res && res.status === 'success') renderDoctorReport(res.report);
    });
  </script>
</body>
</html>
