<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diabetes Intelligence - LifeLensAI</title>
  <link rel="stylesheet" href="css/index.css">
  <style>
    .split-layout { display: grid; grid-template-columns: 380px 1fr; gap: 3rem; margin-top: 3rem; align-items: start; }
    .input-sidebar { padding: 2.5rem; position: sticky; top: 120px; }
    .results-area { min-height: 800px; }
    .metric-bubble { padding: 1.5rem; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; }
    .rec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    
    @media (max-width: 1024px) {
      .split-layout { grid-template-columns: 1fr; }
      .input-sidebar { position: static; }
    }
  </style>
</head>
<body>

  <header class="main-header"></header>

  <main class="container">
    <div class="split-layout">
      
      <!-- Left: Inputs -->
      <aside class="glass-card input-sidebar animate-slide-up">
        <h3 class="mb-2">Module Inputs</h3>
        <p class="text-muted mb-8" style="font-size: 0.9rem;">Provide your clinical metrics manually or via PDF extraction.</p>
        
        <div class="glass-card" id="drop-zone" style="background: rgba(220, 20, 60, 0.03); border: 2px dashed var(--primary-pink); padding: 1.5rem; text-align: center; cursor: pointer; margin-bottom: 2rem;">
          <span style="font-size: 1.5rem;">📄</span>
          <p style="font-weight: 600; font-size: 0.9rem; margin-top: 0.5rem;">Extract from Report</p>
          <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
        </div>

        <form id="health-form">
          <div class="input-group">
            <label class="input-label">Age</label>
            <input type="number" id="Age" required class="input-field" placeholder="e.g. 42">
          </div>
          <div class="input-group">
            <label class="input-label">BMI</label>
            <input type="number" step="0.1" id="BMI" required class="input-field" placeholder="e.g. 27.5 kg/m²">
          </div>
          <div class="input-group">
            <label class="input-label">Fasting Blood Sugar (FBS)</label>
            <input type="number" step="0.1" id="FBS_mg_dL" required class="input-field" placeholder="e.g. 110 mg/dL">
          </div>
          <div class="input-group">
            <label class="input-label">Postprandial Blood Sugar (PPBS)</label>
            <input type="number" step="0.1" id="PPBS_mg_dL" required class="input-field" placeholder="e.g. 145 mg/dL">
          </div>
          <div class="input-group">
            <label class="input-label">HbA1c</label>
            <input type="number" step="0.1" id="HbA1c_pct" required class="input-field" placeholder="e.g. 6.5 %">
          </div>
          <div class="input-group">
            <label class="input-label">Systolic BP (SBP)</label>
            <input type="number" id="SBP_mmHg" required class="input-field" placeholder="e.g. 120 mmHg">
          </div>
          <div class="input-group">
            <label class="input-label">Diastolic BP (DBP)</label>
            <input type="number" id="DBP_mmHg" required class="input-field" placeholder="e.g. 80 mmHg">
          </div>
          <div class="input-group">
            <label class="input-label">Insulin Level</label>
            <input type="number" step="0.1" id="Insulin_uU_mL" required class="input-field" placeholder="e.g. 15.0 uU/mL">
          </div>
          <div class="input-group">
            <label class="input-label">Physical Activity Score</label>
            <input type="number" id="Physical_Activity_Score" required class="input-field" placeholder="e.g. 60 (0–100)">
          </div>
          <div class="input-group">
            <label class="input-label">Family History of Diabetes</label>
            <select id="Family_History" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Yes/No</option>
              <option value="0">No</option>
              <option value="1">Yes</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">LDL Cholesterol</label>
            <input type="number" step="0.1" id="LDL_mg_dL" required class="input-field" placeholder="e.g. 120 mg/dL">
          </div>
          <div class="input-group">
            <label class="input-label">HDL Cholesterol</label>
            <input type="number" step="0.1" id="HDL_mg_dL" required class="input-field" placeholder="e.g. 50 mg/dL">
          </div>
          <div class="input-group">
            <label class="input-label">Triglycerides</label>
            <input type="number" step="0.1" id="Triglycerides_mg_dL" required class="input-field" placeholder="e.g. 150 mg/dL">
          </div>
          <div class="input-group">
            <label class="input-label">Smoking History</label>
            <select id="Smoking" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Exposure</option>
              <option value="0">No / Minimal</option>
              <option value="1">Active / Historical</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Alcohol Consumption</label>
            <select id="Alcohol" required class="input-field" style="appearance: none; cursor: pointer;">
              <option value="" disabled selected>Select Consumption</option>
              <option value="0">No / Rare</option>
              <option value="1">Frequent</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary mt-6" style="width: 100%; justify-content: center; padding: 1rem;">
            Run Intelligence Engine
          </button>
        </form>
      </aside>

      <!-- Right: Results -->
      <div class="results-area">
        <div id="empty-state" class="glass-card flex flex-col items-center justify-center text-center animate-slide-up" style="height: 400px; padding: 3rem;">
          <div style="font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.5;">🧬</div>
          <h2>Ready for Intelligence Analysis</h2>
          <p class="text-muted mt-2" style="max-width: 400px;">Please populate the metabolic indicators on the left to generate your flagship medical report.</p>
        </div>

        <div id="full-dashboard" class="hidden">
          <div id="risk-alerts"></div>
          
          <div id="predictions-grid" class="flex gap-6 mb-8"></div>

          <div class="glass-card mb-8">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-subtle);">
              <h3 style="font-size: 1.1rem;">Metabolic Metrics Interpretation</h3>
            </div>
            <div id="metrics-analysis"></div>
          </div>

          <h3 class="mb-6 mt-12 flex items-center gap-3">
             <span style="padding: 10px; background: var(--secondary-pink); border-radius: 12px; color: var(--primary-crimson);">🛡️</span>
             AI Intelligence Report
          </h3>
          <div class="rec-grid" id="recommendations-grid"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/report.js"></script>
  <script>
    document.getElementById('health-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        Age: parseInt(document.getElementById('Age').value),
        BMI: parseFloat(document.getElementById('BMI').value),
        FBS_mg_dL: parseFloat(document.getElementById('FBS_mg_dL').value),
        PPBS_mg_dL: parseFloat(document.getElementById('PPBS_mg_dL').value),
        HbA1c_pct: parseFloat(document.getElementById('HbA1c_pct').value),
        SBP_mmHg: parseInt(document.getElementById('SBP_mmHg').value),
        DBP_mmHg: parseInt(document.getElementById('DBP_mmHg').value),
        Insulin_uU_mL: parseFloat(document.getElementById('Insulin_uU_mL').value),
        Physical_Activity_Score: parseInt(document.getElementById('Physical_Activity_Score').value),
        Family_History: parseInt(document.getElementById('Family_History').value),
        LDL_mg_dL: parseFloat(document.getElementById('LDL_mg_dL').value),
        HDL_mg_dL: parseFloat(document.getElementById('HDL_mg_dL').value),
        Triglycerides_mg_dL: parseFloat(document.getElementById('Triglycerides_mg_dL').value),
        Smoking: parseInt(document.getElementById('Smoking').value),
        Alcohol: parseInt(document.getElementById('Alcohol').value)
      };
      
      const res = await predictDisease('diabetes', payload);
      if(res && res.status === 'success') renderDoctorReport(res.report);
    });

    const fileInput = document.getElementById('pdf-upload');
    const dropZone = document.getElementById('drop-zone');
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
      const data = await extractPDFData(e.target.files[0]);
      if(data && data.status === 'success') {
        const d = data.data;
        if(d.age) document.getElementById('age').value = d.age;
        if(d.bmi) document.getElementById('bmi').value = d.bmi;
        if(d.glucose) document.getElementById('glucose').value = d.glucose;
        if(d.ap_hi) document.getElementById('blood_pressure').value = d.ap_hi;
      }
    }
  </script>
</body>
</html>
