<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence History - LifeLensAI</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <header class="main-header"></header>

  <main class="container">
    <div class="animate-slide-up" style="margin-top: 4rem; margin-bottom: 3rem;">
      <h1 style="font-size: 2.8rem; margin-bottom: 0.5rem;" class="flex items-center gap-4">
        Intelligence History
      </h1>
      <p class="subtitle">Review your past clinical evaluations and AI recommendations.</p>
    </div>

    <div id="history-grid" class="flex flex-col gap-6" style="margin-bottom: 6rem;">
      <!-- History Cards Injected Here -->
    </div>
    
    <div id="empty-history" class="hidden glass-card flex flex-col items-center justify-center text-center animate-slide-up" style="height: 400px; padding: 3rem;">
        <div style="font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.5;">🗂️</div>
        <h2>No Clinical Records Found</h2>
        <p class="text-muted mt-2" style="max-width: 400px;">You haven't run any intelligence modules yet. Visit the Diagnostic Hub to begin.</p>
        <a href="dashboard.html" class="btn btn-primary mt-6">Go to Hub</a>
    </div>

  </main>

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const res = await fetchPreviousRecords();
      const grid = document.getElementById('history-grid');
      const emptyState = document.getElementById('empty-history');
      
      if(res && res.status === 'success' && Object.keys(res.data).length > 1) {
          // data contains user_id and then the modules
          const data = res.data;
          let hasRecords = false;

          const modules = {
              'diabetes': { title: 'Diabetes Intelligence', icon: '🩸' },
              'hypertension': { title: 'Hypertension Panel', icon: '💓' },
              'heart_disease': { title: 'Cardia Intelligence', icon: '❤️' }
          };

          for(let mod of Object.keys(modules)) {
              if(data[mod]) {
                  hasRecords = true;
                  const record = data[mod];
                  const riskLevel = record.result.risk_level;
                  let statusColor = 'var(--safe)';
                  if(riskLevel === 'Medium') statusColor = 'var(--warning)';
                  if(riskLevel === 'High') statusColor = 'var(--danger)';

                  const inputs = Object.entries(record.inputs).map(([k, v]) => `
                      <span style="background: var(--bg-color); padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; border: 1px solid var(--border-subtle);">${k.toUpperCase()}: <b>${v}</b></span>
                  `).join('');

                  grid.innerHTML += `
                    <div class="glass-card animate-slide-up" style="padding: 2rem; border-left: 4px solid ${statusColor};">
                        <div class="flex justify-between items-center mb-4">
                            <div class="flex items-center gap-3">
                                <div style="width: 48px; height: 48px; background: var(--secondary-pink); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: var(--primary-crimson);">
                                    ${modules[mod].icon}
                                </div>
                                <div>
                                    <h3 style="font-size: 1.3rem;">${modules[mod].title}</h3>
                                    <p class="text-muted" style="font-size: 0.9rem;">Evaluation completed.</p>
                                </div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 1.5rem; font-weight: 700; color: ${statusColor};">${record.result.probability_percent.toFixed(1)}%</div>
                                <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);">${riskLevel} Risk</div>
                            </div>
                        </div>
                        <div class="mt-6">
                            <p class="input-label mb-2" style="font-size: 0.75rem;">Recorded Metrics</p>
                            <div class="flex flex-wrap gap-2">
                                ${inputs}
                            </div>
                        </div>
                    </div>
                  `;
              }
          }

          if(!hasRecords) {
              emptyState.classList.remove('hidden');
          }
      } else {
          emptyState.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
